<div class="page-header">
  <div class="header-left">
    <a routerLink="/admin/projects" class="back-link">&larr; Back to Projects</a>
    <h1>Create Project</h1>
    <p class="subtitle">Set up a new project for your team</p>
  </div>
</div>

<div class="form-card">
  <div class="form-section">
    <div class="form-group">
      <label for="name">Project Name <span class="required">*</span></label>
      <input id="name" type="text" [(ngModel)]="form.name" placeholder="Enter project name" class="form-input" />
    </div>

    <div class="form-group">
      <label for="description">Description</label>
      <textarea id="description" [(ngModel)]="form.description" placeholder="Describe the project's purpose and goals" rows="5" class="form-input"></textarea>
    </div>

    <div class="form-group">
      <label for="status">Status</label>
      <select id="status" [(ngModel)]="form.status" class="form-input">
        <option value="planning">Planning</option>
        <option value="in-progress">In Progress</option>
        <option value="completed">Completed</option>
      </select>
    </div>
  </div>

  <div class="form-actions">
    <a routerLink="/admin/projects" class="btn ghost">Cancel</a>
    <button class="primary-btn" (click)="submit()" [disabled]="isSubmitting">
      <span *ngIf="!isSubmitting">Create Project</span>
      <span *ngIf="isSubmitting">Creating...</span>
    </button>
  </div>
</div>
